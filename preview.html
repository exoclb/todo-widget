<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Twitch Todo Widget Preview</title>
    <link rel="stylesheet" href="widget.css">
    <style>
      :root {
        --preview-bg: #f4f7fb;
        --preview-panel: rgba(255, 255, 255, 0.86);
        --preview-border: rgba(44, 56, 74, 0.16);
        --preview-text: #1b2635;
        --preview-muted: #647185;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background:
          linear-gradient(135deg, rgba(63, 125, 246, 0.12) 0 25%, transparent 25% 50%, rgba(255, 184, 77, 0.16) 50% 75%, transparent 75%),
          linear-gradient(145deg, #f9fbff 0%, #e7edf6 52%, #f6f0e5 100%);
        background-size:
          46px 46px,
          auto;
        color: var(--preview-text);
        font-family: "Lexend", sans-serif;
        overflow: auto;
      }

      .preview-shell {
        display: grid;
        grid-template-columns: minmax(280px, 380px) minmax(320px, 1fr);
        gap: 24px;
        min-height: 100vh;
        padding: 24px;
      }

      .preview-controls,
      .preview-stage {
        border: 1px solid var(--preview-border);
        border-radius: 8px;
        background: var(--preview-panel);
        box-shadow: 0 18px 44px rgba(31, 43, 62, 0.14);
        backdrop-filter: blur(10px);
      }

      .preview-controls {
        position: relative;
        z-index: 2;
        display: grid;
        align-content: start;
        gap: 16px;
        padding: 18px;
      }

      .preview-heading {
        margin: 0;
        font-size: 24px;
        line-height: 1;
      }

      .preview-note {
        margin: 0;
        color: var(--preview-muted);
        font-size: 14px;
        line-height: 1.35;
      }

      .preview-field {
        display: grid;
        gap: 6px;
      }

      .preview-field label {
        color: var(--preview-muted);
        font-size: 13px;
        font-weight: 700;
        text-transform: uppercase;
      }

      .preview-field input,
      .preview-field select {
        width: 100%;
        min-height: 38px;
        border: 1px solid var(--preview-border);
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.82);
        color: var(--preview-text);
        font: inherit;
        font-size: 16px;
        padding: 8px 10px;
      }

      .preview-row {
        display: grid;
        grid-template-columns: 1fr 130px;
        gap: 10px;
      }

      .preview-image-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 120px 120px;
        gap: 10px;
      }

      .preview-actions {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .preview-button {
        min-height: 38px;
        border: 1px solid rgba(63, 125, 246, 0.28);
        border-radius: 6px;
        background: rgba(63, 125, 246, 0.1);
        color: var(--preview-text);
        cursor: pointer;
        font: inherit;
        font-size: 15px;
        font-weight: 700;
      }

      .preview-button:hover {
        background: rgba(63, 125, 246, 0.16);
      }

      .preview-log {
        display: grid;
        gap: 4px;
        max-height: 190px;
        overflow: auto;
        padding: 10px;
        border: 1px solid var(--preview-border);
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.7);
        color: var(--preview-muted);
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12px;
        line-height: 1.35;
      }

      .preview-stage {
        position: relative;
        z-index: 1;
        min-height: 540px;
        padding: 24px;
        overflow: hidden;
        pointer-events: none;
      }

      .preview-stage__label {
        position: absolute;
        right: 18px;
        bottom: 14px;
        color: rgba(255, 255, 255, 0.38);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      .preview-widget-slot {
        width: min(100%, 420px);
        margin-left: auto;
        pointer-events: none;
      }

      @media (max-width: 820px) {
        .preview-shell {
          grid-template-columns: 1fr;
          padding: 14px;
        }

        .preview-stage {
          min-height: 420px;
        }

        .preview-row {
          grid-template-columns: 1fr;
        }

        .preview-image-row {
          grid-template-columns: 1fr;
        }
      }
    </style>
    <script>
      window.__TWITCH_TODO_WAIT_FOR_WIDGET_LOAD__ = true;
    </script>
  </head>
  <body>
    <main class="preview-shell">
      <section class="preview-controls" aria-label="Preview controls">
        <div>
          <h1 class="preview-heading">Twitch Todo Widget</h1>
          <p class="preview-note">Mock Twitch chat commands locally before installing the widget in StreamElements.</p>
        </div>

        <div class="preview-row">
          <div class="preview-field">
            <label for="username">Username</label>
            <input id="username" value="viewerOne" autocomplete="off">
          </div>
          <div class="preview-field">
            <label for="role">Role</label>
            <select id="role">
              <option value="viewer">Viewer</option>
              <option value="moderator">Moderator</option>
              <option value="streamer">Streamer</option>
            </select>
          </div>
        </div>

        <form id="command-form" class="preview-field">
          <label for="command">Chat command</label>
          <input id="command" value="!task Check game audio" autocomplete="off">
          <button class="preview-button" type="submit">Send Command</button>
        </form>

        <div class="preview-row">
          <div class="preview-field">
            <label for="theme-preset">Theme preset</label>
            <select id="theme-preset">
              <option value="material-light" selected>Material light</option>
              <option value="material-dark">Material dark</option>
              <option value="catppuccin">Catppuccin</option>
              <option value="gruvbox">Gruvbox</option>
              <option value="nord">Nord</option>
              <option value="tokyo-night">Tokyo Night</option>
              <option value="dracula">Dracula</option>
              <option value="rose-pine">Rose Pine</option>
              <option value="kanagawa">Kanagawa</option>
              <option value="one-dark">One Dark</option>
              <option value="monokai">Monokai</option>
            </select>
          </div>
          <div class="preview-field">
            <label for="mode-preset">Wording</label>
            <select id="mode-preset">
              <option value="tasks" selected>Tasks</option>
              <option value="quests">Quests</option>
              <option value="missions">Missions</option>
              <option value="challenges">Challenges</option>
            </select>
          </div>
        </div>

        <div class="preview-field">
          <label for="layout-mode">Layout mode</label>
          <select id="layout-mode">
            <option value="compact" selected>Compact sidebar</option>
            <option value="ticker">Horizontal ticker</option>
            <option value="board">Large board</option>
          </select>
        </div>

        <div class="preview-field">
          <label for="max-list-height">Max list height</label>
          <input id="max-list-height" type="range" min="180" max="720" step="10" value="360">
        </div>

        <div class="preview-field">
          <label for="hide-scrollbar">Scrollbar</label>
          <select id="hide-scrollbar">
            <option value="true" selected>Hidden</option>
            <option value="false">Visible</option>
          </select>
        </div>

        <div class="preview-row">
          <div class="preview-field">
            <label for="enable-voting">Voting mode</label>
            <select id="enable-voting">
              <option value="false" selected>Disabled</option>
              <option value="true">Enabled</option>
            </select>
          </div>
          <div class="preview-field">
            <label for="vote-priority-sort">Vote sort</label>
            <select id="vote-priority-sort">
              <option value="false" selected>Off</option>
              <option value="true">On</option>
            </select>
          </div>
        </div>

        <div class="preview-row">
          <div class="preview-field">
            <label for="vote-duplicate-behavior">Duplicate votes</label>
            <select id="vote-duplicate-behavior">
              <option value="ignore" selected>Ignore</option>
              <option value="change">Change vote</option>
            </select>
          </div>
          <div class="preview-field">
            <label for="vote-cooldown-seconds">Vote cooldown</label>
            <input id="vote-cooldown-seconds" type="number" min="0" max="300" step="1" value="0">
          </div>
        </div>

        <div class="preview-row">
          <div class="preview-field">
            <label for="enable-animations">Animations</label>
            <select id="enable-animations">
              <option value="true" selected>Enabled</option>
              <option value="false">Disabled</option>
            </select>
          </div>
          <div class="preview-field">
            <label for="animation-speed">Speed</label>
            <input id="animation-speed" type="range" min="0.5" max="2" step="0.1" value="1">
          </div>
        </div>

        <div class="preview-image-row">
          <div class="preview-field">
            <label for="panel-image-url">Panel image URL</label>
            <input id="panel-image-url" placeholder="https://..." autocomplete="off">
          </div>
          <div class="preview-field">
            <label for="panel-image-opacity">Image opacity</label>
            <input id="panel-image-opacity" type="range" min="0" max="1" step="0.01" value="0.35">
          </div>
          <div class="preview-field">
            <label for="panel-image-fit">Image fit</label>
            <select id="panel-image-fit">
              <option value="cover">Cover</option>
              <option value="contain">Contain</option>
            </select>
          </div>
        </div>

        <div class="preview-image-row">
          <div class="preview-field">
            <label for="frame-image-url">Frame image URL</label>
            <input id="frame-image-url" placeholder="https://..." autocomplete="off">
          </div>
          <div class="preview-field">
            <label for="frame-image-opacity">Frame opacity</label>
            <input id="frame-image-opacity" type="range" min="0" max="1" step="0.01" value="0.55">
          </div>
          <div class="preview-field">
            <label for="frame-image-fit">Frame fit</label>
            <select id="frame-image-fit">
              <option value="cover">Cover</option>
              <option value="contain">Contain</option>
            </select>
          </div>
        </div>

        <div class="preview-row">
          <div class="preview-field">
            <label for="task-icon-image-url">Task icon URL</label>
            <input id="task-icon-image-url" placeholder="https://..." autocomplete="off">
          </div>
          <div class="preview-field">
            <label for="task-icon-image-opacity">Icon opacity</label>
            <input id="task-icon-image-opacity" type="range" min="0" max="1" step="0.01" value="1">
          </div>
        </div>

        <div class="preview-actions">
          <button class="preview-button" type="button" data-action="sample">Add Sample</button>
          <button class="preview-button" type="button" data-action="done-first">Done First</button>
          <button class="preview-button" type="button" data-action="vote-first">Vote First</button>
          <button class="preview-button" type="button" data-action="vote-second">Vote Second</button>
          <button class="preview-button" type="button" data-action="remove-first">Remove First</button>
          <button class="preview-button" type="button" data-action="fill">Fill To Max</button>
          <button class="preview-button" type="button" data-action="reset">Reset</button>
        </div>

        <div>
          <p class="preview-note">Preview log</p>
          <div id="preview-log" class="preview-log" aria-live="polite"></div>
        </div>
      </section>

      <section class="preview-stage" aria-label="Widget preview stage">
        <div class="preview-widget-slot">
          <div id="todo-widget" class="todo-widget" aria-live="polite">
            <div class="todo-widget__panel">
              <header class="todo-widget__header">
                <div class="todo-widget__title" id="todo-title">STREAM TASKS</div>
                <div class="todo-widget__counter" id="todo-counter">0/10</div>
              </header>
              <ol class="todo-widget__list" id="todo-list"></ol>
              <div class="todo-widget__empty" id="todo-empty">No tasks yet</div>
            </div>
          </div>
        </div>
        <div class="preview-stage__label">Local preview</div>
      </section>
    </main>

    <script src="widget.js"></script>
    <script>
      function getPreviewFieldData() {
        const wording = {
          tasks: { titleText: "STREAM TASKS", emptyText: "No tasks yet", singular: "Task", plural: "Tasks" },
          quests: { titleText: "QUEST BOARD", emptyText: "No quests yet", singular: "Quest", plural: "Quests" },
          missions: { titleText: "LIVE MISSIONS", emptyText: "No missions yet", singular: "Mission", plural: "Missions" },
          challenges: {
            titleText: "CHAT CHALLENGES",
            emptyText: "No challenges yet",
            singular: "Challenge",
            plural: "Challenges",
          },
        }[document.getElementById("mode-preset").value];

        return {
          debugMode: true,
          streamerName: "streamer",
          moderatorNames: "mod, moderator",
          titleText: wording.titleText,
          emptyText: wording.emptyText,
          layoutMode: document.getElementById("layout-mode").value,
          maxListHeight: document.getElementById("max-list-height").value,
          hideScrollbar: document.getElementById("hide-scrollbar").value === "true",
          themePreset: document.getElementById("theme-preset").value,
          taskLabelSingular: wording.singular,
          taskLabelPlural: wording.plural,
          enableVoting: document.getElementById("enable-voting").value === "true",
          voteCooldownSeconds: document.getElementById("vote-cooldown-seconds").value,
          voteDuplicateBehavior: document.getElementById("vote-duplicate-behavior").value,
          votePrioritySort: document.getElementById("vote-priority-sort").value === "true",
          enableAnimations: document.getElementById("enable-animations").value === "true",
          animationSpeed: document.getElementById("animation-speed").value,
          panelImage: document.getElementById("panel-image-url").value,
          panelImageOpacity: document.getElementById("panel-image-opacity").value,
          panelImageFit: document.getElementById("panel-image-fit").value,
          frameImage: document.getElementById("frame-image-url").value,
          frameImageOpacity: document.getElementById("frame-image-opacity").value,
          frameImageFit: document.getElementById("frame-image-fit").value,
          taskIconImage: document.getElementById("task-icon-image-url").value,
          taskIconImageOpacity: document.getElementById("task-icon-image-opacity").value,
        };
      }

      function getMockUser() {
        const username = document.getElementById("username").value.trim() || "viewer";
        const role = document.getElementById("role").value;
        const badges = role === "viewer" ? [] : [{ type: role === "streamer" ? "broadcaster" : "moderator" }];
        return {
          username,
          displayName: username,
          authorId: username.toLowerCase(),
          badges,
          roles: role === "viewer" ? [] : [role],
        };
      }

      function sendMockMessage(message) {
        const user = getMockUser();
        return window.TwitchTodoWidget.enqueueCommand({
          message,
          displayName: user.displayName,
          username: user.username,
          authorId: user.authorId,
          badges: user.badges,
          roles: user.roles,
          raw: { preview: true },
        });
      }

      async function getFirstActiveId() {
        const stored = await window.TwitchTodoWidget.getState();
        const first = stored.tasks.find((task) => task.status === "active");
        return first ? first.id : null;
      }

      document.addEventListener("DOMContentLoaded", async () => {
        window.TwitchTodoWidget.setPreviewLog(document.getElementById("preview-log"));
        await window.TwitchTodoWidget.init(getPreviewFieldData());

        [
          "theme-preset",
          "mode-preset",
          "layout-mode",
          "max-list-height",
          "hide-scrollbar",
          "enable-voting",
          "vote-priority-sort",
          "vote-duplicate-behavior",
          "vote-cooldown-seconds",
          "enable-animations",
          "animation-speed",
          "panel-image-url",
          "panel-image-opacity",
          "panel-image-fit",
          "frame-image-url",
          "frame-image-opacity",
          "frame-image-fit",
          "task-icon-image-url",
          "task-icon-image-opacity",
        ].forEach((id) => {
          document.getElementById(id).addEventListener("input", () => {
            window.TwitchTodoWidget.init(getPreviewFieldData());
          });
        });

        document.getElementById("command-form").addEventListener("submit", async (event) => {
          event.preventDefault();
          const input = document.getElementById("command");
          await sendMockMessage(input.value);
          input.focus();
        });

        document.querySelectorAll("[data-action]").forEach((button) => {
          button.addEventListener("click", async () => {
            const action = button.dataset.action;
            if (action === "sample") {
              await sendMockMessage(`!task Sample task ${Math.floor(Math.random() * 100)}`);
            }
            if (action === "done-first") {
              const id = await getFirstActiveId();
              if (id) await sendMockMessage(`!done ${id}`);
            }
            if (action === "vote-first") {
              const id = await getFirstActiveId();
              if (id) await sendMockMessage(`!vote ${id}`);
            }
            if (action === "vote-second") {
              const stored = await window.TwitchTodoWidget.getState();
              const active = stored.tasks.filter((task) => task.status === "active");
              if (active[1]) await sendMockMessage(`!vote ${active[1].id}`);
            }
            if (action === "remove-first") {
              const id = await getFirstActiveId();
              if (id) await sendMockMessage(`!delete ${id}`);
            }
            if (action === "reset") {
              const role = document.getElementById("role");
              const previousRole = role.value;
              role.value = "streamer";
              await sendMockMessage("!taskreset");
              role.value = previousRole;
            }
            if (action === "fill") {
              const role = document.getElementById("role");
              const username = document.getElementById("username");
              const previousRole = role.value;
              const previousUsername = username.value;
              role.value = "streamer";
              for (let index = 1; index <= 10; index += 1) {
                username.value = `seed${index}`;
                await sendMockMessage(`!task Fill sample ${index}`);
              }
              role.value = previousRole;
              username.value = previousUsername;
            }
          });
        });
      });
    </script>
  </body>
</html>
