<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Layout Smoke</title>
    <link rel="stylesheet" href="../../widget.css">
    <script>
      window.__TWITCH_TODO_WAIT_FOR_WIDGET_LOAD__ = true;
    </script>
  </head>
  <body>
    <div id="todo-widget" class="todo-widget" aria-live="polite">
      <div class="todo-widget__panel">
        <header class="todo-widget__header">
          <div class="todo-widget__title" id="todo-title">STREAM TASKS</div>
          <div class="todo-widget__counter" id="todo-counter">0/10</div>
        </header>
        <ol class="todo-widget__list" id="todo-list"></ol>
        <div class="todo-widget__empty" id="todo-empty">No tasks yet</div>
      </div>
    </div>
    <pre id="result">RUNNING</pre>
    <script src="../../widget.js"></script>
    <script>
      (async () => {
        const result = document.getElementById("result");
        const streamer = {
          displayName: "streamer",
          username: "streamer",
          authorId: "streamer",
          badges: [{ type: "broadcaster" }],
          roles: ["streamer"],
        };

        try {
          localStorage.clear();
          await window.TwitchTodoWidget.init({
            layoutMode: "compact",
            streamerName: "streamer",
            globalCooldownSeconds: 0,
            userCooldownSeconds: 0,
          });
          await window.TwitchTodoWidget.enqueueCommand({ ...streamer, message: "!task Check camera framing" });
          await window.TwitchTodoWidget.enqueueCommand({ ...streamer, message: "!task Review scene audio" });

          for (const layoutMode of ["compact", "ticker", "board"]) {
            await window.TwitchTodoWidget.init({ layoutMode, maxListHeight: 220, streamerName: "streamer" });
            const widget = document.getElementById("todo-widget");
            const items = [...document.querySelectorAll(".todo-widget__item")];
            const numbers = items.map((item) => item.querySelector(".todo-widget__number").textContent).join(",");
            const authors = items.map((item) => item.querySelector(".todo-widget__author").textContent).join(",");
            if (widget.dataset.layout !== layoutMode) throw new Error(`Layout failed: ${layoutMode}`);
            if (items.length !== 2) throw new Error(`Task state changed in ${layoutMode}`);
            if (numbers !== "#1,#2") throw new Error(`Task Numbers changed in ${layoutMode}`);
            if (!authors.includes("by streamer")) throw new Error(`Task Owner missing in ${layoutMode}`);
            if (getComputedStyle(widget).maxWidth === "none") throw new Error(`Max width missing in ${layoutMode}`);
          }

          await window.TwitchTodoWidget.init({
            layoutMode: "compact",
            maxTasks: 20,
            maxListHeight: 180,
            streamerName: "streamer",
            globalCooldownSeconds: 0,
            userCooldownSeconds: 0,
          });
          for (let taskIndex = 0; taskIndex < 10; taskIndex += 1) {
            await window.TwitchTodoWidget.enqueueCommand({ ...streamer, message: `!task Overflow task ${taskIndex}` });
          }
          const list = document.getElementById("todo-list");
          if (list.clientHeight > 190) throw new Error("Task list height is not capped");
          if (list.scrollHeight <= list.clientHeight) throw new Error("Task list does not overflow");
          if (document.getElementById("todo-widget").dataset.hideScrollbar !== "true") {
            throw new Error("Scrollbar hiding is not enabled by default");
          }
          if (!list.querySelector(".todo-widget__item.is-scroll-clone[aria-hidden='true']")) {
            throw new Error("Infinite auto-scroll clones were not created");
          }
          const initialScrollTop = list.scrollTop;
          await new Promise((resolve) => setTimeout(resolve, 2200));
          if (list.scrollTop <= initialScrollTop) throw new Error("Task list auto-scroll did not move");

          await window.TwitchTodoWidget.init({
            layoutMode: "board",
            maxTasks: 20,
            maxListHeight: 180,
            streamerName: "streamer",
          });
          if (list.scrollTop !== 0) throw new Error("Board layout kept the previous scroll position");
          if (!document.querySelector(".todo-widget__item:not(.is-scroll-clone)")) {
            throw new Error("Board layout reload did not render original task content");
          }

          await window.TwitchTodoWidget.init({
            layoutMode: "ticker",
            maxTasks: 20,
            maxListHeight: 180,
            streamerName: "streamer",
          });
          if (list.scrollTop !== 0) throw new Error("Ticker layout kept the previous scroll position");
          if (list.querySelector(".todo-widget__item.is-scroll-clone")) {
            throw new Error("Ticker layout kept auto-scroll clones");
          }

          await window.TwitchTodoWidget.init({
            layoutMode: "compact",
            maxTasks: 20,
            maxListHeight: 180,
            streamerName: "streamer",
          });
          if (list.scrollTop !== 0) throw new Error("Compact layout reload kept the previous scroll position");
          if (!document.querySelector(".todo-widget__item:not(.is-scroll-clone)")) {
            throw new Error("Layout reload did not render original task content");
          }

          const positionChecks = [
            { position: "top-left", edge: "top", side: "left" },
            { position: "top-right", edge: "top", side: "right" },
            { position: "bottom-left", edge: "bottom", side: "left" },
            { position: "bottom-right", edge: "bottom", side: "right" },
          ];

          for (const check of positionChecks) {
            await window.TwitchTodoWidget.init({
              layoutMode: "compact",
              position: check.position,
              streamerName: "streamer",
            });
            const rect = document.getElementById("todo-widget").getBoundingClientRect();
            if (check.edge === "top" && rect.top > 40) throw new Error(`${check.position} is not anchored to top`);
            if (check.edge === "bottom" && window.innerHeight - rect.bottom > 40) {
              throw new Error(`${check.position} is not anchored to bottom`);
            }
            if (check.side === "left" && rect.left > 40) throw new Error(`${check.position} is not anchored to left`);
            if (check.side === "right" && window.innerWidth - rect.right > 40) {
              throw new Error(`${check.position} is not anchored to right`);
            }
          }

          result.textContent = "PASS";
        } catch (error) {
          result.textContent = `FAIL: ${error.message}`;
        }
      })();
    </script>
  </body>
</html>
