<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Hosted Overlay Smoke</title>
    <style>
      iframe {
        display: block;
        width: 1000px;
        height: 720px;
        border: 0;
      }

      pre {
        position: fixed;
        left: 0;
        top: 0;
        margin: 0;
        padding: 8px;
        background: #ffffff;
        color: #111111;
      }
    </style>
  </head>
  <body>
    <iframe id="overlay-frame" title="Hosted Overlay smoke frame"></iframe>
    <pre id="result">RUNNING</pre>
    <script>
      const result = document.getElementById("result");
      const frame = document.getElementById("overlay-frame");

      function assert(condition, message) {
        if (!condition) throw new Error(message);
      }

      function waitFor(check, message, timeoutMs = 3000) {
        const startedAt = Date.now();
        return new Promise((resolve, reject) => {
          function tick() {
            try {
              const value = check();
              if (value) {
                resolve(value);
                return;
              }
            } catch (error) {
              reject(error);
              return;
            }
            if (Date.now() - startedAt > timeoutMs) {
              reject(new Error(message));
              return;
            }
            setTimeout(tick, 50);
          }
          tick();
        });
      }

      function openHostedOverlay(overlayState) {
        return new Promise((resolve) => {
          frame.addEventListener("load", resolve, { once: true });
          localStorage.setItem("twitchTodoHostedOverlayState", JSON.stringify(overlayState));
          frame.src = "../../hosted-overlay.html";
        });
      }

      (async () => {
        try {
          localStorage.clear();
          const activeOverlayState = {
            schemaVersion: 1,
            profile: {
              slug: "hosted-smoke",
              displayName: "Hosted Smoke",
            },
            overlay: {
              refreshIntervalMs: 5000,
            },
            summary: {},
            theme: {
              tokens: {
                themePreset: "material-light",
                accentColor: "#0ea5e9",
              },
            },
            widgets: [
              {
                id: "inactive-widget",
                type: "todo",
                title: "SHOULD NOT RENDER",
                enabled: false,
                settings: {
                  emptyText: "Inactive",
                  maxItems: 1,
                },
                data: {
                  todos: [
                    {
                      id: "task-99",
                      taskNumber: 99,
                      title: "Inactive widget task",
                      authorName: "Hidden",
                      isDone: false,
                      voteCount: 0,
                    },
                  ],
                },
              },
              {
                id: "todo-main",
                type: "todo",
                title: "HOSTED LINK TASKS",
                enabled: true,
                position: "top-right",
                settings: {
                  emptyText: "No hosted tasks",
                  maxItems: 4,
                  enableVoting: true,
                  votePrioritySort: true,
                  layoutMode: "compact",
                },
                data: {
                  todos: [
                    {
                      id: "task-3",
                      taskNumber: 3,
                      title: "Render through public overlay link",
                      authorName: "Dashboard",
                      isDone: false,
                      voteCount: 5,
                    },
                  ],
                },
              },
            ],
          };

          await openHostedOverlay(activeOverlayState);
          await waitFor(
            () => frame.contentDocument.body.dataset.overlayStatus === "active",
            "Hosted Overlay did not become active",
          );

          const doc = frame.contentDocument;
          assert(doc.getElementById("todo-title").textContent === "HOSTED LINK TASKS", "Active widget title missing");
          assert(
            doc.getElementById("todo-list").textContent.includes("Render through public overlay link"),
            "Active widget task missing",
          );
          assert(!doc.body.textContent.includes("Inactive widget task"), "Inactive widget leaked into Hosted Overlay");
          assert(doc.getElementById("todo-list").textContent.includes("5 votes"), "Hosted vote count missing");

          await frame.contentWindow.TwitchTodoWidget.enqueueCommand({
            message: "!task Should stay read only",
            displayName: "Viewer",
            username: "viewer",
            authorId: "viewer",
            badges: [],
            roles: [],
          });
          const hostedState = await frame.contentWindow.TwitchTodoWidget.getState();
          assert(hostedState.tasks.length === 1, "Hosted Overlay command changed read-only state");

          await openHostedOverlay({ ...activeOverlayState, overlayLinkActive: false });
          await waitFor(
            () => frame.contentDocument.body.dataset.overlayStatus === "inactive",
            "Inactive Overlay Link did not render inactive shell",
          );
          assert(!frame.contentDocument.body.textContent.includes("Hosted Smoke"), "Inactive link leaked profile data");
          assert(
            !frame.contentDocument.body.textContent.includes("Render through public overlay link"),
            "Inactive link leaked Overlay State",
          );

          result.textContent = "PASS";
        } catch (error) {
          result.textContent = `FAIL: ${error.message}`;
        }
      })();
    </script>
  </body>
</html>
