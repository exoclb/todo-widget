<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Platform Snapshot Smoke</title>
    <link rel="stylesheet" href="../../widget.css">
    <style>
      pre {
        position: fixed;
        left: 0;
        top: 0;
        margin: 0;
        padding: 8px;
        background: #ffffff;
        color: #111111;
      }
    </style>
    <script>
      window.__TWITCH_TODO_WAIT_FOR_WIDGET_LOAD__ = true;
    </script>
  </head>
  <body>
    <div id="todo-widget" class="todo-widget" aria-live="polite">
      <div class="todo-widget__panel">
        <header class="todo-widget__header">
          <div class="todo-widget__title" id="todo-title">STREAM TASKS</div>
          <div class="todo-widget__counter" id="todo-counter">0/10</div>
        </header>
        <ol class="todo-widget__list" id="todo-list"></ol>
        <div class="todo-widget__empty" id="todo-empty">No tasks yet</div>
      </div>
    </div>
    <pre id="result">RUNNING</pre>
    <script src="../../widget.js"></script>
    <script>
      const result = document.getElementById("result");

      function assert(condition, message) {
        if (!condition) throw new Error(message);
      }

      function getTodoWidget(snapshot) {
        return snapshot.widgets.find((widget) => widget.type === "todo");
      }

      (async () => {
        try {
          localStorage.clear();
          await window.TwitchTodoWidget.init({
            platformSchemaVersion: 1,
            profileSlug: "snapshot-streamer",
            profileDisplayName: "Snapshot Streamer",
            overlayRefreshIntervalMs: 4000,
            titleText: "SNAPSHOT TASKS",
            themePreset: "material-dark",
            accentColor: "#22c55e",
            globalCooldownSeconds: 0,
            userCooldownSeconds: 0,
          });

          const emptySnapshot = await window.TwitchTodoWidget.getOverlaySnapshot();
          const emptyTodoWidget = getTodoWidget(emptySnapshot);
          assert(emptySnapshot.schemaVersion === 1, "Schema version missing");
          assert(emptySnapshot.profile.slug === "snapshot-streamer", "Profile slug missing");
          assert(emptySnapshot.profile.displayName === "Snapshot Streamer", "Profile display name missing");
          assert(emptySnapshot.overlay.refreshIntervalMs === 4000, "Overlay refresh interval missing");
          assert(emptySnapshot.summary && typeof emptySnapshot.summary === "object", "Overlay summary missing");
          assert(Object.keys(emptySnapshot.summary).length === 0, "MVP overlay summary should be empty");
          assert(emptySnapshot.theme.tokens.themePreset === "material-dark", "Theme token missing");
          assert(emptySnapshot.theme.tokens.accentColor === "#22c55e", "Accent token missing");
          assert(emptyTodoWidget, "Todo widget missing");
          assert(emptyTodoWidget.title === "SNAPSHOT TASKS", "Todo title missing");
          assert(Array.isArray(emptyTodoWidget.data.todos), "Todo data list missing");
          assert(emptyTodoWidget.data.todos.length === 0, "Empty snapshot should have no todos");

          await window.TwitchTodoWidget.enqueueCommand({
            message: "!task Snapshot contract task",
            displayName: "ViewerOne",
            username: "viewerone",
            authorId: "viewer-one",
            badges: [],
            roles: [],
          });

          const activeSnapshot = await window.TwitchTodoWidget.getOverlaySnapshot();
          const activeTodoWidget = getTodoWidget(activeSnapshot);
          const [todo] = activeTodoWidget.data.todos;
          assert(activeTodoWidget.data.todos.length === 1, "Snapshot did not include added task");
          assert(todo.id === "task-1", "Snapshot todo id is unstable");
          assert(todo.taskNumber === 1, "Snapshot task number missing");
          assert(todo.title === "Snapshot contract task", "Snapshot todo title missing");
          assert(todo.authorName === "ViewerOne", "Snapshot author missing");
          assert(todo.isDone === false, "New snapshot todo should be active");
          assert(todo.voteCount === 0, "New snapshot todo should have no votes");
          assert(todo.sortOrder === 1, "Snapshot todo sort order missing");

          await window.TwitchTodoWidget.enqueueCommand({
            message: "!done 1",
            displayName: "ViewerOne",
            username: "viewerone",
            authorId: "viewer-one",
            badges: [],
            roles: [],
          });

          const completedSnapshot = await window.TwitchTodoWidget.getOverlaySnapshot();
          const completedTodo = getTodoWidget(completedSnapshot).data.todos[0];
          assert(completedTodo.isDone === true, "Completed snapshot todo should be done");

          await window.TwitchTodoWidget.init({
            platformSchemaVersion: 1,
            profileSlug: "dashboard-streamer",
            profileDisplayName: "Dashboard Streamer",
            titleText: "DASHBOARD TASKS",
            maxTasks: 1,
            globalCooldownSeconds: 0,
            userCooldownSeconds: 0,
          });
          await window.TwitchTodoWidget.dashboard.resetTasks();

          const dashboardAdd = await window.TwitchTodoWidget.dashboard.addTask("Dashboard saved task");
          assert(dashboardAdd && dashboardAdd.nextState, "Dashboard add did not write Task List State");
          const dashboardState = await window.TwitchTodoWidget.getState();
          assert(dashboardState.tasks.length === 1, "Dashboard task missing from Task List State");
          assert(dashboardState.tasks[0].source === "dashboard", "Dashboard task source missing");
          assert(dashboardState.tasks[0].authorKey === "", "Dashboard task received a Viewer Task Owner");
          assert(dashboardState.tasks[0].authorName === "Dashboard Streamer", "Dashboard task author label missing");

          const capacityResult = await window.TwitchTodoWidget.dashboard.addTask("Dashboard overflow task");
          assert(capacityResult.reason === "task_limit_full", "Dashboard add ignored Task Capacity");
          const capacityState = await window.TwitchTodoWidget.getState();
          assert(capacityState.tasks.length === 1, "Dashboard overflow changed Task List State");

          await window.TwitchTodoWidget.dashboard.editTaskText(1, "Dashboard edited task");
          const editedSnapshot = await window.TwitchTodoWidget.getOverlaySnapshot();
          const editedTodo = getTodoWidget(editedSnapshot).data.todos[0];
          assert(editedTodo.title === "Dashboard edited task", "Dashboard edit did not reach Overlay State");
          assert(editedTodo.authorName === "Dashboard Streamer", "Dashboard edit changed author label");

          await window.TwitchTodoWidget.dashboard.completeTask(1);
          const dashboardCompleted = getTodoWidget(await window.TwitchTodoWidget.getOverlaySnapshot()).data.todos[0];
          assert(dashboardCompleted.isDone === true, "Dashboard complete did not reach Overlay State");

          await window.TwitchTodoWidget.dashboard.removeTask(1);
          assert((await window.TwitchTodoWidget.getState()).tasks.length === 0, "Dashboard remove did not update Task List State");

          await window.TwitchTodoWidget.dashboard.addTask("Dashboard reset task");
          await window.TwitchTodoWidget.dashboard.resetTasks();
          assert((await window.TwitchTodoWidget.getState()).tasks.length === 0, "Dashboard reset did not clear Task List State");

          localStorage.setItem(
            "twitchTodoWidgetState",
            JSON.stringify({
              tasks: [
                {
                  id: 99,
                  text: "Stale local task",
                  authorId: "local",
                  authorKey: "local",
                  authorName: "Local",
                  status: "active",
                  createdAt: 1,
                  completedAt: null,
                  votes: {},
                },
              ],
              nextId: 100,
            }),
          );

          await window.TwitchTodoWidget.init({
            schemaVersion: 1,
            profile: {
              slug: "hosted-streamer",
              displayName: "Hosted Streamer",
            },
            overlay: {
              refreshIntervalMs: 7000,
            },
            theme: {
              tokens: {
                themePreset: "material-light",
                accentColor: "#f97316",
              },
            },
            widgets: [
              {
                id: "todo-main",
                type: "todo",
                title: "HOSTED TASKS",
                enabled: true,
                position: "bottom-left",
                settings: {
                  emptyText: "No hosted tasks",
                  maxItems: 5,
                  enableVoting: true,
                  votePrioritySort: true,
                  layoutMode: "compact",
                },
                data: {
                  todos: [
                    {
                      id: "task-7",
                      taskNumber: 7,
                      title: "Render saved overlay task",
                      authorName: "Dashboard",
                      isDone: false,
                      voteCount: 2,
                      sortOrder: 1,
                    },
                  ],
                },
              },
            ],
          });

          assert(document.getElementById("todo-title").textContent === "HOSTED TASKS", "Hosted title did not render");
          assert(
            document.getElementById("todo-list").textContent.includes("Render saved overlay task"),
            "Hosted Overlay did not render widgets data",
          );
          assert(
            !document.getElementById("todo-list").textContent.includes("Stale local task"),
            "Hosted Overlay rendered stale local storage",
          );
          assert(document.getElementById("todo-counter").textContent === "1/5 Task", "Hosted counter did not render");
          assert(document.getElementById("todo-list").textContent.includes("2 votes"), "Hosted votes did not render");

          await window.TwitchTodoWidget.enqueueCommand({
            message: "!task Should stay read only",
            displayName: "ViewerTwo",
            username: "viewertwo",
            authorId: "viewer-two",
            badges: [],
            roles: [],
          });

          const hostedState = await window.TwitchTodoWidget.getState();
          assert(hostedState.tasks.length === 1, "Hosted Overlay command changed read-only state");
          assert(hostedState.tasks[0].text === "Render saved overlay task", "Hosted state did not come from widgets data");

          const hostedSnapshot = await window.TwitchTodoWidget.getOverlaySnapshot();
          const hostedTodo = getTodoWidget(hostedSnapshot).data.todos[0];
          assert(hostedSnapshot.profile.slug === "hosted-streamer", "Hosted snapshot profile missing");
          assert(hostedTodo.title === "Render saved overlay task", "Hosted snapshot did not preserve todo title");
          assert(hostedTodo.voteCount === 2, "Hosted snapshot did not preserve render vote count");

          result.textContent = "PASS";
        } catch (error) {
          result.textContent = `FAIL: ${error.message}`;
        }
      })();
    </script>
  </body>
</html>
