<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Marketplace Gallery Smoke</title>
    <style>
      iframe {
        display: block;
        width: 1280px;
        height: 920px;
        border: 0;
      }

      pre {
        position: fixed;
        left: 0;
        top: 0;
        margin: 0;
        padding: 8px;
        background: #ffffff;
        color: #111111;
      }
    </style>
  </head>
  <body>
    <iframe id="gallery-frame" title="Marketplace gallery smoke frame" src="../../docs/marketplace-gallery.html"></iframe>
    <pre id="result">RUNNING</pre>
    <script>
      const frame = document.getElementById("gallery-frame");
      const result = document.getElementById("result");

      function assert(condition, message) {
        if (!condition) throw new Error(message);
      }

      function waitFor(check, message, timeoutMs = 5000) {
        const startedAt = Date.now();
        return new Promise((resolve, reject) => {
          function tick() {
            try {
              const value = check();
              if (value) {
                resolve(value);
                return;
              }
            } catch (error) {
              reject(error);
              return;
            }
            if (Date.now() - startedAt > timeoutMs) {
              reject(new Error(message));
              return;
            }
            setTimeout(tick, 50);
          }
          tick();
        });
      }

      (async () => {
        try {
          await waitFor(() => frame.contentDocument?.querySelectorAll("iframe").length === 4, "Gallery iframes missing");

          const doc = frame.contentDocument;
          const galleryText = doc.body.textContent;
          assert(galleryText.includes("Twitch Todo Widget"), "Gallery title missing");
          assert(galleryText.includes("Chat command ready"), "Chat command badge missing");
          assert(galleryText.includes("Voting included"), "Voting badge missing");
          assert(galleryText.includes("Streamer/mod controls"), "Streamer control badge missing");
          assert(galleryText.includes("Material Light · Chat Sidebar"), "Material label missing");
          assert(galleryText.includes("Tokyo Night · Voting Board"), "Tokyo Night label missing");
          assert(galleryText.includes("Catppuccin · Live Missions"), "Catppuccin label missing");
          assert(galleryText.includes("Gruvbox · Stream Ticker"), "Gruvbox label missing");

          const widgetFrames = [...doc.querySelectorAll("iframe")];
          await waitFor(
            () => widgetFrames.every((widgetFrame) => widgetFrame.contentDocument?.getElementById("todo-list")?.children.length),
            "Widget gallery examples did not render tasks",
          );

          const [materialFrame, tokyoFrame, catppuccinFrame, gruvboxFrame] = widgetFrames;
          assert(
            materialFrame.contentDocument.body.textContent.includes("Check mic levels"),
            "Material sidebar task missing",
          );
          assert(tokyoFrame.contentDocument.body.textContent.includes("2 votes"), "Tokyo Night voting state missing");
          assert(catppuccinFrame.contentDocument.body.textContent.includes("LIVE MISSIONS"), "Catppuccin wording missing");

          const tickerText = gruvboxFrame.contentDocument.getElementById("todo-list").textContent;
          assert(tickerText.includes("Hydrate"), "Ticker hydrate task missing");
          assert(tickerText.includes("Start boss fight"), "Ticker stream-native task missing");
          assert(!tickerText.includes("Review chat ideas"), "Ticker should not use long clipped sample task");

          result.textContent = "PASS";
        } catch (error) {
          result.textContent = `FAIL: ${error.message}`;
        }
      })();
    </script>
  </body>
</html>
