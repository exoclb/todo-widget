<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Chat Event Smoke</title>
    <style>
      body {
        margin: 0;
      }

      pre {
        position: fixed;
        left: 0;
        top: 0;
        margin: 0;
        padding: 8px;
        background: #ffffff;
        color: #111111;
      }
    </style>
    <script>
      window.__TWITCH_TODO_WAIT_FOR_WIDGET_LOAD__ = true;
    </script>
  </head>
  <body>
    <div id="todo-widget" class="todo-widget" aria-live="polite">
      <div class="todo-widget__panel">
        <header class="todo-widget__header">
          <div class="todo-widget__title" id="todo-title">STREAM TASKS</div>
          <div class="todo-widget__counter" id="todo-counter">0/10</div>
        </header>
        <ol class="todo-widget__list" id="todo-list"></ol>
        <div class="todo-widget__empty" id="todo-empty">No tasks yet</div>
      </div>
    </div>
    <pre id="result">RUNNING</pre>
    <script src="../../widget.js"></script>
    <script>
      const result = document.getElementById("result");
      const originalLocalStorageDescriptor = Object.getOwnPropertyDescriptor(window, "localStorage");

      function waitFor(check, message, timeoutMs = 3000) {
        const startedAt = Date.now();
        return new Promise((resolve, reject) => {
          function tick() {
            try {
              const value = check();
              if (value) {
                resolve(value);
                return;
              }
            } catch (error) {
              reject(error);
              return;
            }
            if (Date.now() - startedAt > timeoutMs) {
              reject(new Error(message));
              return;
            }
            setTimeout(tick, 50);
          }
          tick();
        });
      }

      function dispatchWidgetEvent(detail) {
        window.dispatchEvent(new CustomEvent("onEventReceived", { detail }));
      }

      (async () => {
        try {
          localStorage.clear();
          await window.TwitchTodoWidget.init({
            debugMode: true,
            debugOverlay: true,
            streamerName: "streamer",
            moderatorNames: "mod",
            globalCooldownSeconds: 0,
            userCooldownSeconds: 0,
            completedVisibleSeconds: 30,
          });

          dispatchWidgetEvent({
            listener: "message",
            event: {
              data: {
                text: "!task Official overlay payload",
                displayName: "ViewerOne",
                nick: "viewerone",
                userId: "101",
                badges: [],
              },
            },
          });
          await waitFor(
            () => document.getElementById("todo-list").textContent.includes("Official overlay payload"),
            "Official StreamElements message payload was ignored",
          );
          await waitFor(
            () => document.getElementById("todo-debug-overlay").textContent.includes("command: accepted !task"),
            "Accepted command status was not shown",
          );

          Object.defineProperty(window, "localStorage", {
            configurable: true,
            get() {
              throw new DOMException(
                "The document is sandboxed and lacks the allow-same-origin flag.",
                "SecurityError",
              );
            },
          });
          await window.TwitchTodoWidget.init({
            debugOverlay: true,
            globalCooldownSeconds: 0,
            userCooldownSeconds: 0,
          });
          dispatchWidgetEvent({
            listener: "message",
            event: {
              data: {
                text: "!task Sandboxed storage payload",
                displayName: "SandboxViewer",
                nick: "sandboxviewer",
                userId: "104",
                badges: [],
              },
            },
          });
          await waitFor(
            () => document.getElementById("todo-list").textContent.includes("Sandboxed storage payload"),
            "Sandboxed localStorage fallback command failed",
          );
          if (originalLocalStorageDescriptor) {
            Object.defineProperty(window, "localStorage", originalLocalStorageDescriptor);
          }

          dispatchWidgetEvent({
            event: {
              listener: "chatMessage",
              data: {
                text: "!task ChatMessage listener payload",
                tags: {
                  "display-name": "ViewerTwo",
                  "user-id": "102",
                  badges: "",
                },
                nick: "viewertwo",
              },
            },
          });
          await waitFor(
            () => document.getElementById("todo-list").textContent.includes("ChatMessage listener payload"),
            "chatMessage listener payload was ignored",
          );

          dispatchWidgetEvent({
            event: {
              type: "channel.chat.message",
              data: {
                chatter_user_id: "103",
                chatter_user_login: "viewerthree",
                chatter_user_name: "ViewerThree",
                message: {
                  text: "!task Channel topic payload",
                },
                badges: [],
              },
            },
          });
          await waitFor(
            () => document.getElementById("todo-list").textContent.includes("Channel topic payload"),
            "channel.chat.message payload was ignored",
          );

          dispatchWidgetEvent({
            listener: "message",
            event: {
              data: {
                text: "!taskreset",
                displayName: "Streamer",
                nick: "streamer",
                userId: "104",
                tags: {
                  badges: "broadcaster/1",
                },
              },
            },
          });
          await waitFor(() => document.querySelectorAll(".todo-widget__item").length === 0, "Broadcaster badge reset failed");

          await window.TwitchTodoWidget.init({
            debugOverlay: true,
            streamerName: "streamer",
            globalCooldownSeconds: 0,
            userCooldownSeconds: 0,
          });
          dispatchWidgetEvent({
            event: {
              listener: "widget-button",
              field: "diagnosticButton",
              value: "Add diagnostic task",
            },
          });
          await waitFor(
            () => document.getElementById("todo-list").textContent.includes("Diagnostic task from StreamElements button"),
            "Diagnostic widget-button payload was ignored",
          );

          dispatchWidgetEvent({
            listener: "kvstore:update",
            event: {
              data: {
                key: "customWidget.twitchTodoWidgetState",
                value: {},
              },
            },
          });
          if (document.getElementById("todo-debug-overlay").textContent.includes("ignored listener=kvstore:update")) {
            throw new Error("kvstore:update should not appear as an ignored listener");
          }

          result.textContent = "PASS";
        } catch (error) {
          result.textContent = `FAIL: ${error.message}`;
        }
      })();
    </script>
  </body>
</html>
