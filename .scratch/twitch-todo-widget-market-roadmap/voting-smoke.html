<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Voting Smoke</title>
    <link rel="stylesheet" href="../../widget.css">
    <script>
      window.__TWITCH_TODO_WAIT_FOR_WIDGET_LOAD__ = true;
    </script>
  </head>
  <body>
    <div id="todo-widget" class="todo-widget" aria-live="polite">
      <div class="todo-widget__panel">
        <header class="todo-widget__header">
          <div class="todo-widget__title" id="todo-title">STREAM TASKS</div>
          <div class="todo-widget__counter" id="todo-counter">0/10</div>
        </header>
        <ol class="todo-widget__list" id="todo-list"></ol>
        <div class="todo-widget__empty" id="todo-empty">No tasks yet</div>
      </div>
    </div>
    <pre id="result">RUNNING</pre>
    <script src="../../widget.js"></script>
    <script>
      (async () => {
        const result = document.getElementById("result");
        const streamer = {
          displayName: "streamer",
          username: "streamer",
          authorId: "streamer",
          badges: [{ type: "broadcaster" }],
          roles: ["streamer"],
        };

        function viewer(name) {
          return {
            displayName: name,
            username: name,
            authorId: name,
            badges: [],
            roles: [],
          };
        }

        async function voteCount(id) {
          const stored = await window.TwitchTodoWidget.getState();
          const task = stored.tasks.find((item) => item.id === id);
          return task ? Object.keys(task.votes || {}).length : 0;
        }

        function visibleNumbers() {
          return [...document.querySelectorAll(".todo-widget__number")].map((item) => item.textContent).join(",");
        }

        try {
          localStorage.clear();
          await window.TwitchTodoWidget.init({
            enableVoting: false,
            streamerName: "streamer",
            globalCooldownSeconds: 0,
            userCooldownSeconds: 0,
          });
          await window.TwitchTodoWidget.enqueueCommand({ ...streamer, message: "!task First choice" });
          await window.TwitchTodoWidget.enqueueCommand({ ...streamer, message: "!task Second choice" });
          await window.TwitchTodoWidget.enqueueCommand({ ...viewer("viewer-one"), message: "!vote 2" });
          if ((await voteCount(2)) !== 0) throw new Error("Disabled Voting Mode accepted a vote");

          await window.TwitchTodoWidget.init({
            enableVoting: true,
            voteDuplicateBehavior: "ignore",
            votePrioritySort: true,
            voteCooldownSeconds: 0,
            streamerName: "streamer",
          });
          await window.TwitchTodoWidget.enqueueCommand({ ...viewer("viewer-one"), message: "!vote 2" });
          if ((await voteCount(2)) !== 1) throw new Error("Valid vote did not persist");
          if (visibleNumbers() !== "#2,#1") throw new Error(`Priority sort did not move voted task: ${visibleNumbers()}`);

          await window.TwitchTodoWidget.enqueueCommand({ ...viewer("viewer-one"), message: "!vote 1" });
          if ((await voteCount(1)) !== 0 || (await voteCount(2)) !== 1) {
            throw new Error("Duplicate ignore changed a vote");
          }

          await window.TwitchTodoWidget.enqueueCommand({ ...viewer("viewer-two"), message: "!vote 1" });
          await window.TwitchTodoWidget.enqueueCommand({ ...viewer("viewer-three"), message: "!vote 1" });
          if (visibleNumbers() !== "#1,#2") throw new Error(`Stable Task Numbers changed under sort: ${visibleNumbers()}`);

          await window.TwitchTodoWidget.init({
            enableVoting: true,
            voteDuplicateBehavior: "change",
            votePrioritySort: true,
            voteCooldownSeconds: 0,
            streamerName: "streamer",
          });
          await window.TwitchTodoWidget.enqueueCommand({ ...viewer("viewer-one"), message: "!vote 1" });
          if ((await voteCount(1)) !== 3 || (await voteCount(2)) !== 0) throw new Error("Changed vote did not move");

          await window.TwitchTodoWidget.init({
            enableVoting: true,
            voteDuplicateBehavior: "change",
            votePrioritySort: true,
            voteCooldownSeconds: 60,
            streamerName: "streamer",
          });
          await window.TwitchTodoWidget.enqueueCommand({ ...viewer("viewer-four"), message: "!vote 2" });
          await window.TwitchTodoWidget.enqueueCommand({ ...viewer("viewer-four"), message: "!vote 1" });
          if ((await voteCount(2)) !== 1) throw new Error("Vote cooldown allowed an immediate changed vote");

          await window.TwitchTodoWidget.enqueueCommand({ ...streamer, message: "!done 1" });
          await window.TwitchTodoWidget.enqueueCommand({ ...viewer("viewer-five"), message: "!vote 1" });
          if ((await voteCount(1)) !== 3) throw new Error("Non-active task accepted a vote");

          await window.TwitchTodoWidget.enqueueCommand({ ...streamer, message: "!delete 2" });
          let stored = await window.TwitchTodoWidget.getState();
          if (stored.tasks.some((task) => task.id === 2)) throw new Error("Task Manager could not remove voted task");

          await window.TwitchTodoWidget.enqueueCommand({ ...streamer, message: "!taskreset" });
          stored = await window.TwitchTodoWidget.getState();
          if (stored.tasks.length !== 0 || stored.nextId !== 1) throw new Error("Task List Reset did not clear votes");

          result.textContent = "PASS";
        } catch (error) {
          result.textContent = `FAIL: ${error.message}`;
        }
      })();
    </script>
  </body>
</html>
