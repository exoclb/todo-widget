<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Custom Image Smoke</title>
    <link rel="stylesheet" href="../../widget.css">
    <script>
      window.__TWITCH_TODO_WAIT_FOR_WIDGET_LOAD__ = true;
    </script>
  </head>
  <body>
    <div id="todo-widget" class="todo-widget" aria-live="polite">
      <div class="todo-widget__panel">
        <header class="todo-widget__header">
          <div class="todo-widget__title" id="todo-title">STREAM TASKS</div>
          <div class="todo-widget__counter" id="todo-counter">0/10</div>
        </header>
        <ol class="todo-widget__list" id="todo-list"></ol>
        <div class="todo-widget__empty" id="todo-empty">No tasks yet</div>
      </div>
    </div>
    <pre id="result">RUNNING</pre>
    <script src="../../widget.js"></script>
    <script>
      (async () => {
        const result = document.getElementById("result");
        const streamer = {
          displayName: "streamer",
          username: "streamer",
          authorId: "streamer",
          badges: [{ type: "broadcaster" }],
          roles: ["streamer"],
        };
        const panelImage =
          "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 120'%3E%3Crect width='200' height='120' fill='%2329f4ff'/%3E%3C/svg%3E";
        const frameImage =
          "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 120'%3E%3Cpath d='M4 4h192v112H4z' fill='none' stroke='%23ffffff' stroke-width='8'/%3E%3C/svg%3E";
        const iconImage =
          "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%23ff9cd2'/%3E%3C/svg%3E";

        try {
          localStorage.clear();
          await window.TwitchTodoWidget.init({
            streamerName: "streamer",
            globalCooldownSeconds: 0,
            userCooldownSeconds: 0,
          });
          await window.TwitchTodoWidget.enqueueCommand({ ...streamer, message: "!task Confirm fallback image state" });

          let widget = document.getElementById("todo-widget");
          let panel = document.querySelector(".todo-widget__panel");
          if (widget.dataset.taskIcon !== "false") throw new Error("Empty icon image did not fall back");
          if (document.querySelector(".todo-widget__icon")) throw new Error("Empty icon rendered an icon element");
          if (getComputedStyle(panel, "::after").opacity !== "0") throw new Error("Empty frame image stayed visible");

          await window.TwitchTodoWidget.init({
            streamerName: "streamer",
            panelImage,
            panelImageOpacity: 0.3,
            panelImageFit: "contain",
            frameImage,
            frameImageOpacity: 0.4,
            frameImageFit: "contain",
            taskIconImage: iconImage,
            taskIconImageOpacity: 0.85,
          });

          widget = document.getElementById("todo-widget");
          panel = document.querySelector(".todo-widget__panel");
          const icon = document.querySelector(".todo-widget__icon");
          const rootStyle = getComputedStyle(document.documentElement);
          const frameStyle = getComputedStyle(panel, "::after");
          if (widget.dataset.taskIcon !== "true") throw new Error("Icon image did not enable task icon layout");
          if (!icon) throw new Error("Icon element missing");
          if (!rootStyle.getPropertyValue("--todo-panel-image").includes("data:image")) throw new Error("Panel image missing");
          if (rootStyle.getPropertyValue("--todo-panel-image-fit").trim() !== "contain") throw new Error("Panel fit missing");
          if (!frameStyle.backgroundImage.includes("data:image")) throw new Error("Frame image missing");
          if (frameStyle.opacity !== "0.4") throw new Error("Frame opacity missing");
          if (!getComputedStyle(icon).backgroundImage.includes("data:image")) throw new Error("Icon image missing");
          if (getComputedStyle(icon).opacity !== "0.85") throw new Error("Icon opacity missing");

          await window.TwitchTodoWidget.enqueueCommand({ ...streamer, message: "!task Confirm commands still work" });
          const items = document.querySelectorAll(".todo-widget__item");
          if (items.length !== 2) throw new Error("Commands stopped updating tasks");

          result.textContent = "PASS";
        } catch (error) {
          result.textContent = `FAIL: ${error.message}`;
        }
      })();
    </script>
  </body>
</html>
